service: pmapp-laravel-api

custom:
  stageConfig:
    develop:
      appEnv: develop
      appDebug: true
      logLevel: debug
      logRetentionInDays: 14
      bucketVersioningStatus: Suspended
      bucketDeletionPolicy: Delete
    prod:
      appEnv: production
      appDebug: false
      logLevel: info
      logRetentionInDays: 90
      bucketVersioningStatus: Enabled
      bucketDeletionPolicy: Retain

provider:
  name: aws
  region: ap-northeast-1
  stage: ${opt:stage, 'develop'}
  architecture: x86_64
  logRetentionInDays: ${self:custom.stageConfig.${self:provider.stage}.logRetentionInDays}
  stackTags:
    Service: ${self:service}
    Stage: ${self:provider.stage}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
            - s3:ListBucket
          Resource:
            - arn:aws:s3:::${self:provider.environment.AWS_BUCKET}
            - arn:aws:s3:::${self:provider.environment.AWS_BUCKET}/*
  environment:
    # Laravel
    APP_ENV: ${self:custom.stageConfig.${self:provider.stage}.appEnv}
    APP_DEBUG: ${self:custom.stageConfig.${self:provider.stage}.appDebug}
    LOG_CHANNEL: stderr
    LOG_LEVEL: ${self:custom.stageConfig.${self:provider.stage}.logLevel}

    APP_KEY: ${ssm:/pmapp/${self:provider.stage}/APP_KEY}

    # Supabase
    SUPABASE_URL: ${env:SUPABASE_URL}
    SUPABASE_ANON_KEY: ${env:SUPABASE_ANON_KEY}
    SUPABASE_SERVICE_ROLE_KEY: ${env:SUPABASE_SERVICE_ROLE_KEY}

    # DB (PostgreSQL)
    DB_CONNECTION: pgsql
    DB_HOST: ${ssm:/pmapp/${self:provider.stage}/DB_HOST}
    DB_PORT: 5432
    DB_DATABASE: ${ssm:/pmapp/${self:provider.stage}/DB_DATABASE}
    DB_USERNAME: ${ssm:/pmapp/${self:provider.stage}/DB_USERNAME}
    DB_PASSWORD: ${ssm:/pmapp/${self:provider.stage}/DB_PASSWORD}

    # セッション/キャッシュ（Lambda用）
    CACHE_DRIVER: array
    SESSION_DRIVER: array
    FILESYSTEM_DRIVER: s3

    # AWS
    AWS_BUCKET: ${self:service}-${self:provider.stage}-storage

    # Bref
    BREF_BINARY_RESPONSES: 1

functions:
  # Web (FPM)
  web:
    handler: public/index.php
    runtime: php-82-fpm
    timeout: 28
    events:
      - httpApi: '*'
    environment:
      APP_KEY: ${env:APP_KEY}
      APP_URL: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'

  # Artisan (CLI)
  artisan:
    handler: artisan
    runtime: php-82
    timeout: 120
    layers:
      - ${bref:layer.console}
      - arn:aws:lambda:ap-northeast-1:534081306603:layer:php-82-fpm:102
    environment:
      APP_KEY: ${env:APP_KEY}

resources:
  Resources:
    StorageBucket:
      Type: AWS::S3::Bucket
      DeletionPolicy: ${self:custom.stageConfig.${self:provider.stage}.bucketDeletionPolicy}
      UpdateReplacePolicy: ${self:custom.stageConfig.${self:provider.stage}.bucketDeletionPolicy}
      Properties:
        BucketName: ${self:provider.environment.AWS_BUCKET}
        VersioningConfiguration:
          Status: ${self:custom.stageConfig.${self:provider.stage}.bucketVersioningStatus}
        BucketEncryption:
          ServerSideEncryptionConfiguration:
            - ServerSideEncryptionByDefault:
                SSEAlgorithm: AES256
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true

plugins:
  - ./vendor/bref/bref
  - ./vendor/bref/extra-php-extensions

package:
  patterns:
    - '!node_modules/**'
    - '!tests/**'
    - '!storage/logs/**'
    - '!.env*'
    - '!docker/**'
    - '!docker-compose.yml'
    - '!Dockerfile'
    - '!*.md'
    - '!phpcs.xml'
    - '!phpstan.neon'
    - '!phpunit.xml'
    - 'php/conf.d/**'
