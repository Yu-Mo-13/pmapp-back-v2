AWSTemplateFormatVersion: "2010-09-09"
Description: IAM role for GitHub Actions OIDC deployments to AWS

Parameters:
  RoleName:
    Type: String
    Default: pmapp-github-actions-deploy-role
    Description: IAM role name assumed by GitHub Actions via OIDC
  GitHubOrg:
    Type: String
    Default: Yu-Mo-13
    Description: GitHub organization or user name
  GitHubRepo:
    Type: String
    Default: pmapp-back-v2
    Description: GitHub repository name
  DevelopBranchName:
    Type: String
    Default: develop
    Description: Branch name allowed for development deployments
  MainBranchName:
    Type: String
    Default: main
    Description: Branch name allowed for production deployments

Resources:
  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub:
                  - !Sub repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/${DevelopBranchName}
                  - !Sub repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/${MainBranchName}
      Policies:
        - PolicyName: GitHubActionsServerlessDeployPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CloudFormationDeploy
                Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:CreateStack
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResource
                  - cloudformation:DescribeStackResources
                  - cloudformation:DescribeStacks
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:GetTemplate
                  - cloudformation:ListStackResources
                  - cloudformation:UpdateStack
                  - cloudformation:ValidateTemplate
                Resource: "*"
              - Sid: ServerlessArtifactBucket
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:DeleteBucketPolicy
                  - s3:GetBucketLocation
                  - s3:GetBucketPolicy
                  - s3:GetBucketTagging
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:PutBucketPolicy
                  - s3:PutBucketTagging
                  - s3:PutEncryptionConfiguration
                  - s3:PutObject
                Resource: "*"
              - Sid: LambdaDeploy
                Effect: Allow
                Action:
                  - lambda:AddPermission
                  - lambda:CreateFunction
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:PublishVersion
                  - lambda:RemovePermission
                  - lambda:TagResource
                  - lambda:UntagResource
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                Resource: "*"
              - Sid: ApiGatewayDeploy
                Effect: Allow
                Action:
                  - apigateway:GET
                  - apigateway:POST
                  - apigateway:PATCH
                  - apigateway:DELETE
                Resource: "*"
              - Sid: IamPassRole
                Effect: Allow
                Action:
                  - iam:GetRole
                  - iam:PassRole
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:TagRole
                Resource: "*"
              - Sid: LogsAndEvents
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:DescribeLogGroups
                  - logs:PutRetentionPolicy
                  - logs:TagResource
                  - logs:UntagResource
                  - events:DeleteRule
                  - events:DescribeRule
                  - events:ListTargetsByRule
                  - events:PutRule
                  - events:PutTargets
                  - events:RemoveTargets
                Resource: "*"
              - Sid: ReadParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/pmapp/*

Outputs:
  GitHubActionsDeployRoleArn:
    Description: ARN of the IAM role to use in GitHub Actions
    Value: !GetAtt GitHubActionsDeployRole.Arn
